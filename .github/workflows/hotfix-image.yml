name: Create Hotfix Image

on:
  workflow_dispatch:
    inputs:
      prod_sha:
        description: The current SHA running in production
        required: true
        type: string
      run_tests:
        description: Run CI checks before pushing image
        required: true
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate hotfix
        run: |
          set -euo pipefail

          # Must be exactly 1 commit ahead of production SHA
          COUNT=$(git rev-list --count "${{ inputs.prod_sha }}..HEAD")
          if [ "$COUNT" -ne 1 ]; then
            echo "Error: branch must be exactly 1 commit ahead of ${{ inputs.prod_sha }}. Found $COUNT."
            exit 1
          fi

      - name: Setup Python Env
        if: ${{ inputs.run_tests }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Env Vars
        if: ${{ inputs.run_tests }}
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Install dependencies
        if: ${{ inputs.run_tests }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run CI
        if: ${{ inputs.run_tests }}
        run: python -c "import stream_mcp; print('stream_mcp import OK')"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ECR_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ECR_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_ECR_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ github.event.repository.name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Tag release with hotfix date and branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CLEAN_BRANCH=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          TAG="hotfix-$(date +'%Y%m%d-%H%M%S')-${CLEAN_BRANCH}"

          git tag "$TAG"
          git push origin "$TAG"

          echo "Created and pushed tag: $TAG"

      - name: Final instructions
        run: |
          echo "========================================================================"
          echo "✅ Hotfix image built and tagged"
          echo "🚀 ACTION REQUIRED:"
          echo "Please go to your local services-configuration repo and run:"
          echo "./deploy_hotfix.sh ${{ github.sha }}"
          echo "========================================================================"
