name: CI (Build -> Lint -> Push)

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main

jobs:
  build-lint-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Setup Env Vars
        # This repo config: create .env from .env.example if available.
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Run CI smoke checks
        run: |
          python -c "import stream_mcp; print('stream_mcp import OK')"

      - name: Push image to ECR
        uses: ./.github/actions/push-image-to-ecr
        with:
          gh-token: ${{ secrets.STREAM_GH_TOKEN }}
          ecr-access-key-id: ${{ secrets.AWS_ECR_ACCESS_KEY }}
          ecr-secret-access-key: ${{ secrets.AWS_ECR_SECRET_KEY }}
          ecr-region: ${{ secrets.AWS_ECR_REGION }}
